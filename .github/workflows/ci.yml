name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: true

      - name: Rubocop
        run: bundle exec rubocop

      - name: Syntax Tree
        run: |
          set -E
          bundle exec stree check Gemfile discourse_mail_receiver.gemspec $(git ls-files '*.rb')

      - name: Tests
        run: bundle exec rake test

  # No publish job: this is a BTS-internal fork, not published to RubyGems.
  # The upstream discourse/mail-receiver repo owns that gem name/publish
  # pipeline; publishing from here would either fail (no RUBYGEMS_API_KEY)
  # or, worse, conflict with the real upstream release.
