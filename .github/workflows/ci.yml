name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: true

      - name: Rubocop
        run: bundle exec rubocop

      - name: Syntax Tree
        run: |
          set -E
          bundle exec stree check Gemfile bts_mail_receiver.gemspec $(git ls-files '*.rb')

      - name: Tests
        run: bundle exec rake test

  # No RubyGems publish job: this is a BTS-internal fork, not published to
  # RubyGems. The upstream discourse/mail-receiver repo owns that gem
  # name/publish pipeline; publishing from here would either fail (no
  # RUBYGEMS_API_KEY) or, worse, conflict with the real upstream release.

  publish-image:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/better-together-org/mail-receiver:latest
            ghcr.io/better-together-org/mail-receiver:${{ github.sha }}
